<!-- Botón desplegable de cambio de tema -->
<div class="dropdown dropdown-end">
    <button
        tabindex="0"
        role="button"
        class="btn btn-ghost gap-2"
        aria-label="Cambiar tema"
    >
        <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-5 h-5"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"
            />
        </svg>
        <span class="hidden sm:inline">{{ currentTheme() | titlecase }}</span>
    </button>

    <ul
        tabindex="-1"
        class="dropdown-content menu bg-base-200 rounded-box z-10 w-52 p-2 shadow-lg border border-base-300"
    >
        <li class="menu-title px-4 py-2">
            <span class="text-sm font-semibold">Seleccionar tema</span>
        </li>
        @for (theme of themes; track theme) {
        <li>
            <button
                (click)="setTheme(theme)"
                [class.active]="currentTheme() === theme"
                class="justify-between"
            >
                <span>{{ theme | titlecase }}</span>
                @if (currentTheme() === theme) {
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="2"
                    stroke="currentColor"
                    class="w-4 h-4"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M4.5 12.75l6 6 9-13.5"
                    />
                </svg>
                }
            </button>
        </li>
        }
    </ul>
</div>
