<!-- Search con sombra -->
<form
    (ngSubmit)="onSubmit()"
    class="flex gap-2 md:col-span-2"
>
    <input
        type="text"
        [formControl]="searchControl()"
        placeholder="Buscar por nombre..."
        class="input input-bordered input-primary flex-1 shadow-md focus:shadow-lg transition-shadow"
        aria-label="Buscar usuarios por nombre"
    />
    <button
        type="submit"
        class="btn btn-primary shadow-md hover:shadow-lg transition-all"
        [disabled]="loading()"
    >
        <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
        </svg>
        Buscar
    </button>
    @if (searchControl().value) {
    <button
        type="button"
        class="btn btn-ghost shadow-md hover:shadow-lg transition-all"
        (click)="onClear()"
    >Limpiar</button>
    }
</form>
