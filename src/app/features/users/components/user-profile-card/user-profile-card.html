<article class="group relative overflow-hidden rounded-3xl border border-white/10
         bg-white/[0.045] backdrop-blur-xl
         shadow-[0_8px_30px_rgba(0,0,0,0.35)]
         transition-all duration-300
         hover:-translate-y-1 hover:bg-white/[0.06] hover:shadow-[0_12px_40px_rgba(0,0,0,0.45)]">
    <!-- Noise overlay -->
    <div
        class="pointer-events-none absolute inset-0 bg-[linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.01))]">
    </div>

    <div class="pointer-events-none absolute inset-x-0 top-0 h-px bg-white/15"></div>



    <div class="card-body items-center text-center gap-3 relative z-10">

        <!-- Avatar -->
        <div class="avatar">
            <div class="w-20 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2 overflow-hidden">
                @if (avatarUrl(); as img) {
                <img
                    [src]="img"
                    alt="Foto de {{ user().name }}"
                    loading="lazy"
                />
                } @else {
                <div
                    class="flex items-center justify-center h-full w-full"
                    [class]="avatarClass()"
                >
                    <span class="text-2xl font-bold">{{ initial() }}</span>
                </div>
                }
            </div>
        </div>

        <!-- Name -->
        <h2 class="card-title text-lg font-semibold">
            {{ user().name }}
        </h2>

        <!-- Email -->
        <p class="text-sm text-base-content/60 truncate max-w-[200px]">
            {{ user().email }}
        </p>

        <!-- Roles -->
        <div class="flex flex-wrap gap-1.5 justify-center">
            @for (role of user().roles; track role) {
            <span class="badge badge-sm border border-base-300/40 bg-base-100/30 backdrop-blur-md text-base-content/80">
                {{ formatRole(role) }}
            </span>
            }
        </div>

        <!-- Action -->
        <div class="card-actions mt-2">
            <button
                class="btn btn-sm btn-primary btn-outline gap-1 hover:scale-[1.02] transition-transform"
                (click)="viewProfile.emit(user())"
                [attr.aria-label]="'Ver perfil de ' + user().name"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-4 w-4"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    aria-hidden="true"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                </svg>
                Ver perfil
            </button>
        </div>

    </div>
</article>
