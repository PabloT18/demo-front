<div class="container mx-auto px-4 py-8 max-w-6xl">
    <!-- Header -->
    <app-user-list-header [total]="total()" />

    <!-- Controls con mejor diseño -->
    <div class="bg-base-200 rounded-xl p-6 shadow-lg border border-base-300 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Search Form -->
            <app-user-search-form
                [loading]="loading()"
                (search)="onSearch($event)"
                (clear)="clearSearch()"
            />

            <!-- Filters -->
            <app-user-filters
                [pageSize]="pageSize()"
                [showAll]="showAll()"
                [loading]="loading()"
                [pageSizeOptions]="[5, 10]"
                (sizeChange)="onSizeChange($event)"
                (showAllChange)="onShowAllChange($event)"
            />
        </div>
    </div>

    <!-- States -->
    @if (loading()) {
    <div class="flex flex-col gap-4">
        @for (_ of [1, 2, 3]; track $index) {
        <div class="skeleton h-20 w-full rounded-xl shadow-lg"></div>
        }
    </div>
    } @else if (error()) {
    <div
        role="alert"
        class="alert alert-error shadow-xl rounded-xl border-2 border-error"
    >
        <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6 shrink-0 stroke-current"
            fill="none"
            viewBox="0 0 24 24"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
            />
        </svg>
        <span>{{ error() }}</span>
        <button
            class="btn btn-sm btn-outline btn-error hover:btn-error shadow-md"
            (click)="loadUsers()"
        >Reintentar</button>
    </div>
    } @else {
    <!-- User Table -->
    <app-user-table
        [users]="users()"
        (userClick)="onUserClick($event)"
    />

    <!-- Pagination -->
    @if (!showAll() && totalPages() > 1) {
    <div class="mt-6">
        <app-pagination
            [totalPages]="totalPages()"
            [currentPage]="currentPage()"
            (pageChange)="onPageChange($event)"
        />
    </div>
    }
    }
</div>
